<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign-up Form</title>
</head>
<body>
    <div id="structure">
        <section id="card">
            <div id="card-container">
                <div id="card-image">
                    <img src="images/halie-west-25xggax4bSA-unsplash.jpg" alt="">
                </div>
                
                <div id="card-body">
                    <h1 id="card-heading">ODIN</h1>
                </div>
            </div>
        </section>

        <section id="form">
            <h1>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.
                Sign-up <i>now</i> to get started.
            </h1>

            <h2>You <i>know</i> you want to.</h2>

            <h3>Let's do this!</h2>

            <form action="">

                <label for="first_name">First Name</label>
                <input type="text" name="first_name" id="first_name" placeholder="Giussepe">

                <label for="last_name">Last Name</label>
                <input type="text" name="last_name" id="last_name" placeholder="Cadura">

                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="JosePicadura@gmail.com">

                <label for="phone_number">Phone Number</label>
                <input type="number" name="phone_number" id="phone_number" placeholder="123456789">

                <label for="password">Password</label>
                <input type="password" name="password" id="password">

                <label for="password">Confirm Password</label>
                <input type="password" name="password" id="password">

                <div></div>

                <button type="submit">Create Account</button>
                <p>Already have an account? <a href="blank">Log in</a></p>
            </form>
        </section>

    </div>
</body>
</html>
